name: Security

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build crawler image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.crawler
          push: false
          load: true
          tags: techdetector/crawler:scan
      - name: Scan crawler image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'techdetector/crawler:scan'
          severity: 'CRITICAL,HIGH'
      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: false
          load: true
          tags: techdetector/worker:scan
      - name: Scan worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'techdetector/worker:scan'
          severity: 'CRITICAL,HIGH'
