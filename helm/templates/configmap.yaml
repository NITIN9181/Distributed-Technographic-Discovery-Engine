apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    {{- include "techdetector.labels" . | nindent 4 }}
data:
  MAX_CONCURRENT: {{ .Values.crawler.maxConcurrent | quote }}
  WORKER_BATCH_SIZE: {{ .Values.worker.batchSize | default "10" | quote }}
  RESPECT_ROBOTS: {{ .Values.config.respectRobots | quote }}
  SKIP_RECENT_HOURS: {{ .Values.config.skipRecentHours | quote }}
  METRICS_PORT: {{ .Values.config.metricsPort | quote }}
  WORKER_HEALTH_PORT: {{ .Values.config.workerHealthPort | quote }}
  RUST_LOG: {{ .Values.config.rustLog | quote }}
