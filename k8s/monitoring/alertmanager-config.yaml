apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: techdetector
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          group_wait: 10s
        - match:
            severity: warning
          receiver: 'default'

    receivers:
      - name: 'default'
        # Configure your notification channel:
        # slack_configs:
        #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
        #     channel: '#techdetector-alerts'
        #     send_resolved: true

      - name: 'critical'
        # Configure your critical notification channel:
        # pagerduty_configs:
        #   - service_key: 'YOUR-PAGERDUTY-KEY'
        # slack_configs:
        #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
        #     channel: '#techdetector-critical'
        #     send_resolved: true

    inhibit_rules:
      - source_match:
            severity: 'critical'
          target_match:
            severity: 'warning'
          equal: ['alertname']
