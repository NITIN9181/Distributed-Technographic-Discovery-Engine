apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: techdetector
  labels:
    app: worker
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: techdetector
spec:
  replicas: 5
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: worker
          image: ghcr.io/yourorg/techdetector/worker:latest
          envFrom:
            - configMapRef:
                name: techdetector-config
            - secretRef:
                name: techdetector-secrets
          ports:
            - containerPort: 9090
              name: metrics
            - containerPort: 8080
              name: health
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
