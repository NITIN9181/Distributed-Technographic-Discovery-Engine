version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: techdetector
      POSTGRES_USER: techdetector
      POSTGRES_PASSWORD: localdev123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techdetector"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  crawler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.crawler
    environment:
      REDIS_URL: redis://redis:6379
      MAX_CONCURRENT: 500
      RUST_LOG: info
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://techdetector:localdev123@postgres:5432/techdetector
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
